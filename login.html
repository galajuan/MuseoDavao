<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Davao Heritage Museum</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, var(--green-dark), var(--green-mid)); }
    .admin-login-card { background: white; border-radius: var(--radius-lg); padding: 3rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
    .admin-login-logo { text-align: center; margin-bottom: 2rem; }
    .admin-login-logo .icon { font-size: 3rem; background: var(--yellow); width: 72px; height: 72px; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 0.75rem; }
    .admin-login-logo h1 { font-size: 1.4rem; color: var(--green-dark); }
    .admin-login-logo p { font-size: 0.82rem; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; }
    .admin-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--green-pale); color: var(--green-dark); padding: 0.35rem 0.85rem; border-radius: 100px; font-size: 0.78rem; font-weight: 600; margin-bottom: 1.75rem; }
  </style>
</head>
<body>
<div class="admin-login-card">
  <div class="admin-login-logo">
    <div class="icon">🏛️</div>
    <h1>Admin Portal</h1>
    <p>Davao Heritage Museum</p>
  </div>

  <div style="text-align:center">
    <span class="admin-badge">🔐 Restricted Access</span>
  </div>

  <div class="form-group">
    <label>Admin Email</label>
    <input type="email" id="admin-email" placeholder="admin@davaomuseum.gov.ph" />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="admin-password" placeholder="••••••••" />
  </div>

  <div id="error-msg" style="display:none;background:#fee2e2;color:#991b1b;padding:0.75rem 1rem;border-radius:8px;font-size:0.85rem;margin-bottom:1rem"></div>

  <button class="btn btn-green btn-lg" style="width:100%;justify-content:center" onclick="adminLogin()">
    Sign In to Dashboard →
  </button>

  <div style="text-align:center;margin-top:1.5rem">
    <a href="../../index.html" style="font-size:0.83rem;color:var(--gray)">← Back to Museum Website</a>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="config.js"></script>
<script>
async function adminLogin() {
  const email = document.getElementById('admin-email').value.trim();
  const password = document.getElementById('admin-password').value;
  const errorMsg = document.getElementById('error-msg');
  errorMsg.style.display = 'none';

  if (!email || !password) {
    errorMsg.textContent = 'Please enter your email and password.';
    errorMsg.style.display = 'block';
    return;
  }

  try {
    const data = await signIn(email, password);

    // Check admin role
    if (supabase) {
      const { data: profile } = await supabase
        .from('profiles')
        .select('role')
        .eq('id', data.user.id)
        .single();

      if (profile?.role !== 'admin') {
        await supabase.auth.signOut();
        errorMsg.textContent = 'Access denied. This account does not have admin privileges.';
        errorMsg.style.display = 'block';
        return;
      }
    }

    // For demo/offline mode — allow login with test credentials
    localStorage.setItem('admin_logged_in', 'true');
    localStorage.setItem('admin_email', email);
    window.location.href = 'dashboard.html';

  } catch(e) {
    // Demo fallback — allow admin@museum.ph / admin123
    if (email === 'admin@museum.ph' && password === 'admin123') {
      localStorage.setItem('admin_logged_in', 'true');
      localStorage.setItem('admin_email', email);
      window.location.href = 'dashboard.html';
      return;
    }
    errorMsg.textContent = 'Invalid credentials. ' + e.message;
    errorMsg.style.display = 'block';
  }
}

// Enter key support
document.addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });

// Redirect if already logged in
if (localStorage.getItem('admin_logged_in')) window.location.href = 'dashboard.html';
</script>
</body>
</html>
